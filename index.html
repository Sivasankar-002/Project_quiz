<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-animation"></div>

<header class="floating">
<h1>✨ Smart Quiz</h1>
<p>Test Your Knowledge in Style</p>
</header>

<div class="container glass floating">

<!-- HOME -->
<div id="homePage">
<h2>Enter Details</h2>
<input type="text" id="studentName" placeholder="Your Name">
<input type="number" id="regNo" placeholder="Register Number">
<button onclick="showLevels()">Start Quiz</button>
</div>

<!-- LEVEL -->
<div id="levelPage" class="hide">
<h2>Select Difficulty</h2>
<button onclick="startQuiz('easy')">Easy</button>
<button onclick="startQuiz('moderate')">Medium</button>
<button onclick="startQuiz('hard')">Hard</button>
</div>

<!-- QUIZ -->
<div id="quizPage" class="hide">
<h3 id="counter"></h3>
<h2 id="question"></h2>
<div id="answers"></div>
<button id="nextBtn" class="hide" onclick="nextQuestion()">Next</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="hide">
<h2>🎉 Result</h2>
<p id="studentInfo"></p>
<h3 id="score"></h3>

<div id="reviewSection"></div>

<button onclick="restartQuiz()">Restart</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
